<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Hedvig+Letters+Serif&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shoppingcart.css">
</head>

<body>

<header class="header">
  <div class="header-left">
    

    <a href="../MainMenu/MainMenu.html"><button class="home-btn" id="headerHomeBtn">
      <svg width="24" height="24" fill="none" stroke="#001356" stroke-width="2" viewBox="0 0 24 24">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
        <polyline points="9 22 9 12 15 12 15 22"></polyline>
      </svg>
    </button></a>

    <span class="logo-text">Book Bloom</span>
  </div>
  <div class="header-center">
    <h1 class="page-title">SHOPPING CART</h1>
  </div>

  <div class="header-right">
    <a href="../OrderList/OrderList.html">
      <button class="back-btn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#001356" stroke-width="2">
          <line x1="8" y1="6" x2="21" y2="6"></line>
          <line x1="8" y1="12" x2="21" y2="12"></line>
          <line x1="8" y1="18" x2="21" y2="18"></line>
          <line x1="3" y1="6" x2="3.01" y2="6"></line>
          <line x1="3" y1="12" x2="3.01" y2="12"></line>
          <line x1="3" y1="18" x2="3.01" y2="18"></line>
        </svg>
      </button>
    </a>
    <a href="../userprofile/userprofile.html">
      <button class="back-btn" id="headerProfileBtn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#001356" stroke-width="2">
          <circle cx="12" cy="8" r="4"></circle>
          <path d="M6 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"></path>
        </svg>
      </button>
    </a>
  </div>
</header>

<div class="container">

  <div class="cart-header">
    <span class="item-label">Item</span>
    <span class="price-label">Item total price</span>
  </div>

  <div class="cart-items" id="cartList"></div>

  <div class="cart-footer">
    <div class="subtotal">
      <span  class="subtotal-label">Subtotal:</span>
      <span class="subtotal-price" id="subtotalValue">$0</span>
    </div>

<a href="../checkout/checkout.html"><button class="checkout-btn">Checkout</button></a>
</div>


<script src="../CommonProfile.js"></script>
<script src="shoppingcart.js"></script>
</body>
</html>
