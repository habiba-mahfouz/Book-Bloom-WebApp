<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Bloom - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Hedvig+Letters+Serif&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="Login.css">
</head>

<body>
    <header class="header">
        <div class="header-left">
            <a href="../MainMenu/MainMenu.html">
                <button class="home-btn" aria-label="Home" style="margin-right: 15px; width: 42px; height: 42px; background: #F0DFC8; border: none; color: #001356; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 12px;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#001356" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                </button>
            </a>
            <span class="logo-text">Book Bloom</span>
        </div>
    </header>

    <div class="container">
        <div class="bg-circle"></div>



        <form class="login-form" id="loginForm">
            <div class="form-group">
                <label for="identifier">Email / Username / Phone Number</label>
                <div class="input-wrapper">
                    <input type="text" id="identifier" placeholder="Enter your email, username or phone" required>
                    <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                        <polyline points="22,6 12,13 2,6"></polyline>
                    </svg>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="Enter your password" required>
                    <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                        <svg class="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                    <svg class="input-icon lock-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                </div>
            </div>

            <button type="button" class="submit-btn">Log In</button>

            <p class="terms-text">
                By signing up or logging in, you consent to BookBloom's
                <a href="terms.html">Terms of Use</a>
                and
                <a href="privacy.html">Privacy Policy</a>.
            </p>

            <a href="../signup/signup.html" class="signup-link">Sign up</a>
        </form>
    </div>


    <script src="./login.js"></script>
</body>


</html>
